<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0d0d"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Outer border card -->
  <rect x="80" y="60" width="1040" height="510" rx="28" fill="#141414" stroke="#c9a84c" stroke-opacity="0.25" stroke-width="1.5"/>

  <!-- Stars -->
  <text x="600" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="72" fill="#FBBC04" text-anchor="middle" letter-spacing="8">★★★★★</text>

  <!-- Big score -->
  <text x="600" y="360" font-family="system-ui,-apple-system,sans-serif" font-size="148" font-weight="700" fill="#c9a84c" text-anchor="middle" letter-spacing="-4">4.9</text>

  <!-- Google rating label -->
  <text x="600" y="420" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="600" fill="#f5f0e8" fill-opacity="0.4" text-anchor="middle" letter-spacing="5">GOOGLE RATING</text>

  <!-- Brand -->
  <text x="600" y="520" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="700" fill="#f5f0e8" fill-opacity="0.85" text-anchor="middle" letter-spacing="-0.5">replify<tspan fill="#c9a84c">.ink</tspan></text>
</svg>
